<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>账户净值追踪</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0f172a;--card:#1e293b;--border:#334155;--text:#e2e8f0;--dim:#94a3b8}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);padding:20px;max-width:1400px;margin:0 auto}
h1{font-size:22px;margin-bottom:8px}
.sub{color:var(--dim);font-size:13px;margin-bottom:20px}
.nav{display:flex;gap:16px;margin-bottom:20px}
.nav a{color:#60a5fa;text-decoration:none;font-size:14px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(500px,1fr));gap:20px}
.card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:16px}
.card h2{font-size:16px;margin-bottom:4px}
.card .aum{color:var(--dim);font-size:12px;margin-bottom:10px}
.chart-wrap{position:relative;height:280px}
canvas{width:100%!important}
.legend{display:flex;gap:12px;font-size:11px;color:var(--dim);margin-top:8px;justify-content:center}
.legend span{display:flex;align-items:center;gap:4px}
.dot{width:10px;height:10px;border-radius:50%}
.total{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:16px;margin-bottom:20px;display:flex;justify-content:space-around;flex-wrap:wrap}
.total div{text-align:center}
.total .val{font-size:24px;font-weight:700}
.total .lbl{font-size:12px;color:var(--dim);margin-top:2px}
.disclaimer{color:var(--dim);font-size:11px;text-align:center;margin-top:20px}
</style>
</head>
<body>
<h1>📊 账户净值追踪</h1>
<div class="sub">各账户净值曲线 | 回测→模拟→实盘 | 数据最后更新: <span id="updTime">--</span></div>
<div class="nav"><a href="./">📈 资产排名</a><a href="factors.html">📐 因子监控</a><a href="strategy.html">📊 策略监控</a><a href="nav.html" style="color:var(--text);font-weight:600">📊 账户净值</a></div>
<div class="total" id="totalBar"></div>
<div class="grid" id="grid"></div>
<div class="legend">
  <span><span class="dot" style="background:#64748b"></span> 历史回测</span>
  <span><span class="dot" style="background:#3b82f6"></span> 模拟跟踪</span>
  <span><span class="dot" style="background:#ef4444"></span> 实盘净值</span>
</div>
<div class="disclaimer">⚠️ 净值数据每日更新。回测部分为历史模拟,实盘部分为真实交易数据。</div>
<script>
let charts=[], accounts={}, dailyData={};

fetch('nav_tracker.json?'+Date.now()).then(r=>r.json()).then(d=>{
  accounts=d.accounts; dailyData=d.nav_data||{};
  document.getElementById('updTime').textContent=d.generated_at||'--';
  renderTotal(); renderAll();
});

function renderTotal(){
  let totalAUM=0; for(let k in accounts) totalAUM+=accounts[k].aum;
  document.getElementById('totalBar').innerHTML=
    '<div><div class="lbl">总规模</div><div class="val">¥'+(totalAUM/1e4).toFixed(0)+'万</div></div>'+
    '<div><div class="lbl">账户数</div><div class="val">8</div></div>'+
    '<div><div class="lbl">已实盘</div><div class="val">'+Object.keys(dailyData).filter(k=>dailyData[k]&&dailyData[k].live&&dailyData[k].live.length>0).length+'</div></div>';
}

function renderAll(){
  document.getElementById('grid').innerHTML='';
  for(let key in accounts){
    let acc=accounts[key];
    let div=document.createElement('div'); div.className='card';
    div.innerHTML='<h2>'+acc.name+'</h2><div class="aum">AUM: ¥'+acc.aum.toLocaleString()+'</div><div class="chart-wrap"><canvas id="c_'+key+'"></canvas></div>';
    document.getElementById('grid').appendChild(div);
  }
  setTimeout(function(){for(let key in accounts)drawChart(key,accounts[key]);},100);
}

function drawChart(key,acc){
  let d=dailyData[key]||{};
  let backtest=d.backtest||[], sim=d.sim||[], live=d.live||[];
  
  let datasets=[];
  
  // Phase 1: Backtest (light grey, dashed)
  if(backtest.length>0) datasets.push({
    label:'回测',data:backtest.map(p=>({x:p.date,y:p.nav})),borderColor:'#64748b',
    borderWidth:1,borderDash:[4,3],pointRadius:0,tension:0.3
  });
  
  // Phase 2: Simulation (blue, bold)
  if(sim.length>0) datasets.push({
    label:'模拟',data:sim.map(p=>({x:p.date,y:p.nav})),borderColor:'#3b82f6',
    borderWidth:2.5,pointRadius:0,tension:0.3
  });
  
  // Phase 3: Live (red, bold)
  if(live.length>0) datasets.push({
    label:'实盘',data:live.map(p=>({x:p.date,y:p.nav})),borderColor:'#ef4444',
    borderWidth:2.5,pointRadius:2,pointBackgroundColor:'#ef4444',tension:0.3
  });
  
  if(datasets.length===0){
    // No data yet — generate initial point
    datasets.push({
      label:'起点',data:[{x:'2026-06-30',y:1.0}],borderColor:'#64748b',
      borderWidth:1,pointRadius:4,pointBackgroundColor:'#64748b'
    });
  }
  
  new Chart(document.getElementById('c_'+key).getContext('2d'),{
    type:'line',data:{datasets:datasets},
    options:{
      responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false},tooltip:{callbacks:{label:function(ctx){return (ctx.raw.y*100-100).toFixed(1)+'%'}}}},
      scales:{
        x:{type:'time',time:{unit:'month'},ticks:{color:'#94a3b8',font:{size:10}},grid:{color:'#1e293b'}},
        y:{ticks:{color:'#94a3b8',callback:function(v){return ((v-1)*100).toFixed(0)+'%'}},grid:{color:'#1e293b'}}
      }
    }
  });
}
</script>
</body>
</html>
