<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>策略监控面板</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root { --bg: #0f172a; --card: #1e293b; --border: #334155; --text: #e2e8f0; --dim: #94a3b8; --blue: #60a5fa; --green: #22c55e; --red: #ef4444; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
         background: var(--bg); color: var(--text); padding: 20px; }
  h1 { font-size: 22px; margin-bottom: 4px; }
  .sub { color: var(--dim); font-size: 13px; margin-bottom: 10px; }
  .nav { margin-bottom: 14px; display: flex; gap: 14px; }
  .nav a { color: var(--blue); text-decoration: none; font-size: 14px; }
  .nav a.active { color: var(--text); font-weight: 600; }
  .chart-stats { display: flex; gap: 24px; margin-bottom: 14px; font-size: 13px; flex-wrap: wrap; }
  .chart-stat { display: flex; flex-direction: column; }
  .chart-stat .label { color: var(--dim); font-size: 11px; }
  .chart-stat .value { font-weight: 600; font-size: 15px; }
  .chart-stat .up { color: var(--green); } .chart-stat .down { color: var(--red); }
  .chart-wrap { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 16px; height: 440px; position: relative; }
  canvas { width: 100% !important; }
  .crosshair-tip { display: none; position: absolute; background: #0f172a; border: 1px solid var(--dim); border-radius: 4px;
    padding: 4px 8px; font-size: 12px; pointer-events: none; z-index: 10; white-space: nowrap; }
  .footer { text-align: center; font-size: 12px; color: var(--dim); margin-top: 8px; }
  .footer a { color: var(--blue); text-decoration: none; }
</style>
</head>
<body>
<h1>📊 策略监控面板</h1>
<div class="sub">数据更新: <span id="gentime"></span></div>
<div class="nav">
  <a href="./">📈 资产排名</a>
  <a href="factors.html">📐 因子监控</a>
  <a href="strategy.html" class="active">📊 策略监控</a>
</div>

<div class="chart-stats" id="stats"></div>
<div class="chart-wrap" id="chartWrap">
  <canvas id="navChart"></canvas>
  <div class="crosshair-tip" id="crosshairTip"></div>
</div>
<div class="footer">基准: 中证全指(000985) · <a href="strategy.json">原始数据</a></div>

<script>
fetch('strategy.json?' + Date.now())
  .then(r => r.json())
  .then(d => {
    document.getElementById('gentime').textContent = d.generated_at;
    let s = d.strategy;
    
    document.getElementById('stats').innerHTML =
      '<div class="chart-stat"><span class="label">涨跌幅</span><span class="value ' + (s.latest_change>=0?'up':'down') + '">' + (s.latest_change>=0?'+':'') + s.latest_change + '%</span></div>' +
      '<div class="chart-stat"><span class="label">累计收益</span><span class="value ' + (s.total_return>=0?'up':'down') + '">' + (s.total_return>=0?'+':'') + s.total_return + '%</span></div>' +
      '<div class="chart-stat"><span class="label">年化收益</span><span class="value ' + (s.annual_return>=0?'up':'down') + '">' + (s.annual_return>=0?'+':'') + s.annual_return + '%</span></div>' +
      '<div class="chart-stat"><span class="label">最大回撤</span><span class="value down">-' + s.max_drawdown + '%</span></div>' +
      '<div class="chart-stat"><span class="label">夏普比率</span><span class="value">' + s.sharpe + '</span></div>' +
      '<div class="chart-stat"><span class="label">卡玛比率</span><span class="value">' + s.calmar + '</span></div>' +
      '<div class="chart-stat"><span class="label">年化波动</span><span class="value">' + s.annual_vol + '%</span></div>' +
      '<div class="chart-stat"><span class="label">1万→总额</span><span class="value">¥' + s.total_value_10k.toLocaleString() + '</span></div>' +
      '<div class="chart-stat"><span class="label">最长无新高</span><span class="value">' + s.max_high_gap_days + '天</span></div>' +
      '<div class="chart-stat"><span class="label">无新高区间</span><span class="value">' + s.no_high_start + '~' + s.no_high_end + '</span></div>' +
      '<div class="chart-stat"><span class="label">已回撤天数</span><span class="value">' + s.days_since_last_peak + '天</span></div>' +
      '<div class="chart-stat"><span class="label">近期高点</span><span class="value">' + s.last_peak_date + '</span></div>';

    let nav = d.nav_history, bnav = d.benchmark_nav;
    let labels = nav.map(h => h.date);
    let navData = nav.map(h => h.nav);
    let ctx = document.getElementById('navChart').getContext('2d');
    let tip = document.getElementById('crosshairTip');
    let wrap = document.getElementById('chartWrap');

    // Crosshair plugin
    const crosshairPlugin = {
      id: 'crosshair',
      afterDatasetsDraw(chart, args, opts) {
        if (!opts.active) return;
        let x = opts.x, y = opts.y;
        let ctx = chart.ctx;
        let ca = chart.chartArea;
        ctx.save();
        ctx.setLineDash([3,3]);
        ctx.strokeStyle = '#64748b';
        ctx.lineWidth = 1;
        ctx.beginPath(); ctx.moveTo(x, ca.top); ctx.lineTo(x, ca.bottom); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(ca.left, y); ctx.lineTo(ca.right, y); ctx.stroke();
        ctx.restore();
      }
    };

    let chart = new Chart(ctx, {
      type: 'line',
      data: {
        labels: labels,
        datasets: [
          {
            label: '策略净值',
            data: navData,
            borderColor: '#ef4444',
            backgroundColor: 'rgba(239,68,68,0.08)',
            fill: true, tension: 0.1, pointRadius: 0, borderWidth: 2,
            pointHoverRadius: 5, pointHoverBackgroundColor: '#fff',
            segment: {
              borderColor: function(ctx) {
                return nav[ctx.p0DataIndex] && nav[ctx.p0DataIndex].in_drawdown ? '#22c55e' : '#ef4444';
              }
            }
          },
          {
            label: '中证全指(000985)',
            data: bnav.map(h => h.nav),
            borderColor: '#64748b', backgroundColor: 'transparent',
            borderDash: [4,4], tension: 0.1, pointRadius: 0, borderWidth: 1
          }
        ]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        interaction: { mode: 'index', intersect: false },
        plugins: {
          legend: { labels: { color: '#94a3b8', usePointStyle: true } },
          crosshair: { active: false, x: 0, y: 0 },
          tooltip: {
            enabled: true,
            position: 'nearest',
            callbacks: {
              title: function(items) { return items[0].label; },
              label: function(ctx) { return ctx.dataset.label + ': ' + ctx.parsed.y.toFixed(4); }
            }
          }
        },
        scales: {
          x: { ticks: { color: '#94a3b8', maxTicksLimit: 20, font:{size:10} }, grid: { color: '#1e293b' } },
          y: { ticks: { color: '#94a3b8' }, grid: { color: '#1e293b' } }
        }
      },
      plugins: [crosshairPlugin]
    });

    // Handle mousemove to update crosshair
    wrap.addEventListener('mousemove', function(evt) {
      let rect = wrap.getBoundingClientRect();
      let x = evt.clientX - rect.left;
      let y = evt.clientY - rect.top;
      
      let points = chart.getElementsAtEventForMode(evt, 'index', { intersect: false }, true);
      if (points.length) {
        chart.options.plugins.crosshair = {
          active: true,
          x: points[0].element.x,
          y: points[0].element.y
        };
      }
      chart.update('none');
    });
    
    wrap.addEventListener('mouseleave', function() {
      chart.options.plugins.crosshair.active = false;
      chart.update('none');
    });
  });
</script>
</body>
</html>
