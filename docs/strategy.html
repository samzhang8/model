<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>策略监控面板</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
         background: #0f172a; color: #e2e8f0; padding: 20px; }
  h1 { font-size: 22px; margin-bottom: 4px; }
  .sub { color: #94a3b8; font-size: 13px; margin-bottom: 12px; }
  .nav { margin-bottom: 14px; }
  .nav a { color: #60a5fa; text-decoration: none; font-size: 14px; margin-right: 14px; }
  .nav a.active { color: #e2e8f0; font-weight: 600; }
  .cards { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 16px; }
  .card { background: #1e293b; border: 1px solid #334155; border-radius: 8px; padding: 12px 16px; min-width: 100px; }
  .card .val { font-size: 22px; font-weight: 700; }
  .card .lbl { color: #94a3b8; font-size: 11px; margin-top: 2px; }
  .card .vs { font-size: 11px; margin-top: 2px; }
  .green { color: #22c55e; } .red { color: #ef4444; } .vs-color { color: #64748b; }
  .chart-wrap { background: #1e293b; border: 1px solid #334155; border-radius: 8px; padding: 16px; height: 420px; position: relative; }
  canvas { width: 100% !important; }
</style>
</head>
<body>
<h1>📊 策略监控面板</h1>
<div class="sub">数据更新: <span id="gentime"></span></div>
<div class="nav">
  <a href="./">📈 资产排名</a>
  <a href="factors.html">📐 因子监控</a>
  <a href="strategy.html" class="active">📊 策略监控</a>
</div>

<div class="cards" id="cards"></div>
<div class="chart-wrap"><canvas id="navChart"></canvas></div>

<script>
fetch('strategy.json?' + Date.now())
  .then(r => r.json())
  .then(d => {
    document.getElementById('gentime').textContent = d.generated_at;
    let s = d.strategy, b = d.benchmark;
    
    document.getElementById('cards').innerHTML = 
      '<div class="card"><div class="val green">+' + s.total_return + '%</div><div class="lbl">累计收益</div><div class="vs vs-color">基准 +' + b.total_return + '%</div></div>' +
      '<div class="card"><div class="val green">+' + s.annual_return + '%</div><div class="lbl">年化收益</div><div class="vs vs-color">基准 +' + b.annual_return + '%</div></div>' +
      '<div class="card"><div class="val">' + s.sharpe + '</div><div class="lbl">夏普比率</div></div>' +
      '<div class="card"><div class="val green">-' + s.max_drawdown + '%</div><div class="lbl">最大回撤</div></div>' +
      '<div class="card"><div class="val">' + s.n_assets + '</div><div class="lbl">持仓数</div></div>' +
      '<div class="card"><div class="val">' + s.rebalance + '</div><div class="lbl">调仓</div></div>';
    
    let nav = d.nav_history, bnav = d.benchmark_nav;
    let labels = nav.map(h => h.date);
    let ctx = document.getElementById('navChart').getContext('2d');
    new Chart(ctx, {
      type: 'line',
      data: {
        labels: labels,
        datasets: [
          {
            label: '策略净值',
            data: nav.map(h => h.nav),
            borderColor: '#ef4444', backgroundColor: 'rgba(239,68,68,0.08)',
            fill: true, tension: 0.1, pointRadius: 0, borderWidth: 2
          },
          {
            label: b.name + '(' + (b.code || '') + ')',
            data: bnav.map(h => h.nav),
            borderColor: '#64748b', backgroundColor: 'transparent',
            borderDash: [4,4], tension: 0.1, pointRadius: 0, borderWidth: 1
          }
        ]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: {
          legend: { labels: { color: '#94a3b8', usePointStyle: true } },
          tooltip: { callbacks: { label: function(ctx) { return ctx.dataset.label + ': ' + ctx.parsed.y.toFixed(4); } } }
        },
        scales: {
          x: { ticks: { color: '#94a3b8', maxTicksLimit: 20, font: {size:10} }, grid: { color: '#1e293b' } },
          y: { ticks: { color: '#94a3b8' }, grid: { color: '#1e293b' } }
        }
      }
    });
  });
</script>
</body>
</html>
