<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>策略监控面板</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root { --bg: #0f172a; --card: #1e293b; --border: #334155; --text: #e2e8f0; --dim: #94a3b8; --blue: #60a5fa; --green: #22c55e; --red: #ef4444; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
         background: var(--bg); color: var(--text); padding: 20px; }
  h1 { font-size: 22px; margin-bottom: 10px; }
  .nav { margin-bottom: 14px; display: flex; gap: 14px; }
  .nav a { color: var(--blue); text-decoration: none; font-size: 14px; }
  .nav a.active { color: var(--text); font-weight: 600; }
  .up { color: var(--green); } .down { color: var(--red); }
  
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th, td { padding: 10px 12px; text-align: right; white-space: nowrap; }
  th { color: var(--dim); font-weight: 500; border-bottom: 1px solid var(--border); cursor: pointer; position: sticky; top: 0; background: var(--bg); }
  th:first-child, td:first-child { text-align: left; }
  td { border-bottom: 1px solid #1e293b; }
  tr:hover td { background: #1e293b; }
  tr { cursor: pointer; }
  .name { color: var(--blue); }
  
  .modal-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.8); z-index: 100; justify-content: center; align-items: center; }
  .modal-overlay.active { display: flex; }
  .modal { background: var(--bg); border: 1px solid var(--border); border-radius: 12px; padding: 24px; width: min(95vw, 900px); max-height: 90vh; overflow-y: auto; }
  .modal h2 { font-size: 18px; margin-bottom: 4px; }
  .modal .src { color: var(--dim); font-size: 12px; margin-bottom: 14px; }
  .modal .desc { color: var(--dim); font-size: 13px; margin-bottom: 12px; }
  .modal-stats { display: flex; gap: 20px; flex-wrap: wrap; margin-bottom: 14px; }
  .modal-stat { display: flex; flex-direction: column; }
  .modal-stat .label { color: var(--dim); font-size: 11px; }
  .modal-stat .value { font-weight: 600; font-size: 15px; }
  .modal-close { position: absolute; top: 12px; right: 16px; background: none; border: 1px solid var(--border); color: var(--dim); font-size: 18px; cursor: pointer; border-radius: 4px; padding: 2px 8px; }
  .chart-wrap { position: relative; height: 380px; }
  canvas { width: 100% !important; }
  @media (max-width: 600px) { table { font-size: 11px; } th, td { padding: 6px 4px; } }
</style>
</head>
<body>
<h1>📊 策略监控面板</h1>
<div class="nav">
  <a href="./">📈 资产排名</a>
  <a href="factors.html">📐 因子监控</a>
  <a href="strategy.html" class="active">📊 策略监控</a>
</div>

<table>
<thead>
<tr>
  <th onclick="sortTable(0)">策略名称</th>
  <th onclick="sortTable(1)" class="sort-active">年化收益 ▾</th>
  <th onclick="sortTable(2)">累计收益</th>
  <th onclick="sortTable(3)">夏普比率</th>
  <th onclick="sortTable(4)">最大回撤</th>
  <th onclick="sortTable(5)">卡玛比率</th>
  <th onclick="sortTable(6)">年化波动</th>
  <th onclick="sortTable(7)">1万→总额</th>
  <th onclick="sortTable(8)">调仓</th>
</tr>
</thead>
<tbody id="tbody"></tbody>
</table>

<div class="modal-overlay" id="modalOverlay" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <h2 id="modalTitle"></h2>
    <div class="src" id="modalSource"></div>
    <div class="desc" id="modalDesc"></div>
    <div class="modal-stats" id="modalStats"></div>
    <div class="chart-wrap"><canvas id="modalChart"></canvas></div>
  </div>
</div>

<script>
let chart, strategies;

fetch('strategies.json?'+Date.now())
  .then(r=>r.json())
  .then(d=>{
    strategies = d.strategies;
    render();
  });

function render() {
  document.getElementById('tbody').innerHTML = strategies.map(s=>{
    return '<tr onclick="showDetail(\''+s.id+'\')">'+
      '<td class="name">'+s.name+'</td>'+
      '<td class="'+(s.annual_return>=0?'up':'down')+'">'+(s.annual_return>=0?'+':'')+s.annual_return+'%</td>'+
      '<td class="'+(s.total_return>=0?'up':'down')+'">'+(s.total_return>=0?'+':'')+s.total_return+'%</td>'+
      '<td>'+s.sharpe+'</td>'+
      '<td class="down">-'+s.max_drawdown+'%</td>'+
      '<td>'+s.calmar+'</td>'+
      '<td>'+s.annual_vol+'%</td>'+
      '<td>¥'+s.total_value_10k.toLocaleString()+'</td>'+
      '<td>'+s.rebalance+'</td>'+
    '</tr>';
  }).join('');
}

function showDetail(id) {
  let s = strategies.find(x=>x.id===id);
  if(!s) return;
  document.getElementById('modalTitle').textContent = s.name;
  document.getElementById('modalSource').textContent = '来源: '+s.source+' · '+s.start_date+' ~ '+s.end_date;
  document.getElementById('modalDesc').textContent = s.description;
  document.getElementById('modalStats').innerHTML =
    '<div class="modal-stat"><span class="label">年化收益</span><span class="value '+(s.annual_return>=0?'up':'down')+'">'+(s.annual_return>=0?'+':'')+s.annual_return+'%</span></div>'+
    '<div class="modal-stat"><span class="label">累计收益</span><span class="value '+(s.total_return>=0?'up':'down')+'">'+(s.total_return>=0?'+':'')+s.total_return+'%</span></div>'+
    '<div class="modal-stat"><span class="label">夏普比率</span><span class="value">'+s.sharpe+'</span></div>'+
    '<div class="modal-stat"><span class="label">最大回撤</span><span class="value down">-'+s.max_drawdown+'%</span></div>'+
    '<div class="modal-stat"><span class="label">卡玛比率</span><span class="value">'+s.calmar+'</span></div>'+
    '<div class="modal-stat"><span class="label">年化波动</span><span class="value">'+s.annual_vol+'%</span></div>'+
    '<div class="modal-stat"><span class="label">1万→总额</span><span class="value">¥'+s.total_value_10k.toLocaleString()+'</span></div>';
  
  document.getElementById('modalOverlay').classList.add('active');
  
  if(chart) chart.destroy();
  let nav = s.nav_history;
  let ctx = document.getElementById('modalChart').getContext('2d');
  chart = new Chart(ctx, {
    type:'line',
    data:{
      labels:nav.map(h=>h.date),
      datasets:[{
        label:'净值',data:nav.map(h=>h.nav),
        borderColor:'#ef4444',backgroundColor:'rgba(239,68,68,0.08)',
        fill:true,tension:0.1,pointRadius:0,borderWidth:2
      }]
    },
    options:{
      responsive:true,maintainAspectRatio:false,
      plugins:{
        legend:{display:false},
        crosshair:{active:false,x:0,y:0}
      },
      scales:{
        x:{ticks:{color:'#94a3b8',maxTicksLimit:15,font:{size:10}},grid:{color:'#1e293b'}},
        y:{ticks:{color:'#94a3b8'},grid:{color:'#1e293b'}}
      }
    }
  });
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('active');
}
</script>
</body>
</html>
