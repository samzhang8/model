<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>策略监控面板</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root { --bg: #0f172a; --card: #1e293b; --border: #334155; --text: #e2e8f0; --dim: #94a3b8; --blue: #60a5fa; --green: #22c55e; --red: #ef4444; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
         background: var(--bg); color: var(--text); padding: 20px; }
  h1 { font-size: 22px; margin-bottom: 4px; }
  .sub { color: var(--dim); font-size: 13px; margin-bottom: 10px; }
  .nav { margin-bottom: 14px; display: flex; gap: 14px; }
  .nav a { color: var(--blue); text-decoration: none; font-size: 14px; }
  .nav a.active { color: var(--text); font-weight: 600; }
  .header { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 14px 18px; margin-bottom: 14px; }
  .header .meta { display: flex; gap: 20px; flex-wrap: wrap; align-items: center; }
  .header .meta span { font-size: 13px; color: var(--dim); }
  .chart-stats { display: flex; gap: 24px; margin-bottom: 14px; font-size: 13px; flex-wrap: wrap; }
  .chart-stat { display: flex; flex-direction: column; }
  .chart-stat .label { color: var(--dim); font-size: 11px; }
  .chart-stat .value { font-weight: 600; font-size: 15px; }
  .chart-stat .value.up { color: var(--green); }
  .chart-stat .value.down { color: var(--red); }
  .chart-wrap { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 16px; height: 420px; position: relative; }
  canvas { width: 100% !important; }
  .footer { text-align: center; margin-top: 16px; font-size: 12px; color: var(--dim); }
  .footer a { color: var(--blue); text-decoration: none; }
</style>
</head>
<body>
<h1>📊 策略监控面板</h1>
<div class="sub">数据更新: <span id="gentime"></span></div>
<div class="nav">
  <a href="./">📈 资产排名</a>
  <a href="factors.html">📐 因子监控</a>
  <a href="strategy.html" class="active">📊 策略监控</a>
</div>

<div class="chart-stats" id="stats"></div>
<div class="chart-wrap"><canvas id="navChart"></canvas></div>
<div class="footer">
  <span id="strategyDesc"></span> · 基准: <span id="bmName"></span> · <a href="strategy.json">原始数据</a>
</div>

<script>
fetch('strategy.json?' + Date.now())
  .then(r => r.json())
  .then(d => {
    document.getElementById('gentime').textContent = d.generated_at;
    let s = d.strategy, b = d.benchmark;
    
    // Stats like asset panel
    document.getElementById('stats').innerHTML = 
      '<div class="chart-stat"><span class="label">净值</span><span class="value">' + (d.nav_history[d.nav_history.length-1].nav).toFixed(4) + '</span></div>' +
      '<div class="chart-stat"><span class="label">累计收益</span><span class="value ' + (s.total_return>=0?'up':'down') + '">' + (s.total_return>=0?'+':'') + s.total_return + '%</span></div>' +
      '<div class="chart-stat"><span class="label">年化收益</span><span class="value ' + (s.annual_return>=0?'up':'down') + '">' + (s.annual_return>=0?'+':'') + s.annual_return + '%</span></div>' +
      '<div class="chart-stat"><span class="label">最大回撤</span><span class="value down">-' + s.max_drawdown + '%</span></div>' +
      '<div class="chart-stat"><span class="label">夏普比率</span><span class="value">' + s.sharpe + '</span></div>' +
      '<div class="chart-stat"><span class="label">持仓数</span><span class="value">' + s.n_assets + '</span></div>' +
      '<div class="chart-stat"><span class="label">调仓</span><span class="value">' + s.rebalance + '</span></div>';
    
    document.getElementById('strategyDesc').textContent = s.description;
    document.getElementById('bmName').textContent = b.name;

    let nav = d.nav_history, bnav = d.benchmark_nav;
    let labels = nav.map(h => h.date);
    let ctx = document.getElementById('navChart').getContext('2d');
    new Chart(ctx, {
      type: 'line',
      data: {
        labels: labels,
        datasets: [
          { label: '策略净值', data: nav.map(h=>h.nav),
            borderColor: '#ef4444', backgroundColor: 'rgba(239,68,68,0.08)',
            fill: true, tension: 0.1, pointRadius: 0, borderWidth: 2 },
          { label: b.name, data: bnav.map(h=>h.nav),
            borderColor: '#64748b', backgroundColor: 'transparent',
            borderDash: [4,4], tension: 0.1, pointRadius: 0, borderWidth: 1 }
        ]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: { legend: { labels: { color: '#94a3b8', usePointStyle: true } } },
        scales: {
          x: { ticks: { color: '#94a3b8', maxTicksLimit: 20, font:{size:10} }, grid: { color: '#1e293b' } },
          y: { ticks: { color: '#94a3b8' }, grid: { color: '#1e293b' } }
        }
      }
    });
  });
</script>
</body>
</html>
